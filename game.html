<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easter Egg Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #fcefd4; --text-color: #0f0f0f; }
        body { font-family: 'Space Mono', Courier, monospace; background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; box-sizing: border-box; overflow: hidden; }
        .back-btn { position: absolute; top: 20px; left: 20px; font-family: 'Press Start 2P'; font-size: 1rem; color: var(--text-color); text-decoration: none; border: 2px solid var(--text-color); box-shadow: 2px 2px 0 var(--text-color); padding: 10px; z-index: 100; }
        canvas { border: 2px solid var(--text-color); box-shadow: 4px 4px 0 var(--text-color); background-color: #fff; max-width: 90vw; max-height: 70vh; }
        #score { font-family: 'Press Start 2P'; margin-bottom: 20px; }
        @media (max-width: 800px) { canvas { width: 90vw; height: 90vw; } }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">&lt; BACK</a>
    <div id="score">SCORE: 0</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <p style="margin-top:20px;text-align:center;font-size:0.8rem;">Tap the screen or use arrow keys to change direction</p>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        let snake = [{x: 200, y: 200}];
        let food = {x: 100, y: 100};
        let dx = 0; let dy = -gridSize;
        let score = 0;
        let gameLoop;
        
        function drawRect(c, x, y, size) { ctx.fillStyle = c; ctx.fillRect(x, y, size, size); }
        function main() {
            if(hasGameEnded()) return;
            gameLoop = setTimeout(function() {
                ctx.clearRect(0,0, canvas.width, canvas.height);
                drawFood(); advanceSnake(); drawSnake(); main();
            }, 100);
        }
        function drawFood() { drawRect('red', food.x, food.y, gridSize); }
        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            if(head.x === food.x && head.y === food.y) {
                score += 10; document.getElementById('score').innerText = 'SCORE: ' + score; generateFood();
            } else { snake.pop(); }
        }
        function drawSnake() { snake.forEach(part => drawRect('#0f0f0f', part.x, part.y, gridSize)); }
        function hasGameEnded() {
            for(let i=4; i<snake.length; i++) { if(snake[i].x===snake[0].x && snake[i].y===snake[0].y) return true; }
            const hitLeftWall = snake[0].x < 0; const hitRightWall = snake[0].x >= canvas.width;
            const hitTopWall = snake[0].y < 0; const hitBottomWall = snake[0].y >= canvas.height;
            return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall;
        }
        function generateFood() {
            food.x = Math.round((Math.random()*(canvas.width - gridSize))/gridSize)*gridSize;
            food.y = Math.round((Math.random()*(canvas.height - gridSize))/gridSize)*gridSize;
        }
        document.addEventListener('keydown', e => {
            const LEFT=37, RIGHT=39, UP=38, DOWN=40;
            if(e.keyCode===LEFT && dx!==gridSize) { dx=-gridSize; dy=0; }
            if(e.keyCode===UP && dy!==gridSize) { dx=0; dy=-gridSize; }
            if(e.keyCode===RIGHT && dx!==-gridSize) { dx=gridSize; dy=0; }
            if(e.keyCode===DOWN && dy!==-gridSize) { dx=0; dy=gridSize; }
        });
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const tapX = touch.clientX - rect.left;
            const tapY = touch.clientY - rect.top;
            const head = snake[0];
            if (Math.abs(tapX - head.x) > Math.abs(tapY - head.y)) {
                if (tapX > head.x && dx !== -gridSize) { dx = gridSize; dy = 0; }
                else if (tapX < head.x && dx !== gridSize) { dx = -gridSize; dy = 0; }
            } else {
                if (tapY > head.y && dy !== -gridSize) { dx = 0; dy = gridSize; }
                else if (tapY < head.y && dy !== gridSize) { dx = 0; dy = -gridSize; }
            }
        });
        generateFood(); main();
    </script>
</body>
</html>
