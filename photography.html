<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex Gaffen - Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fcefd4;
            --text-color: #0f0f0f;
            --link-color: #0f0f0f;
            --link-hover: #d62020;
            --border-color: #d1cdc2;
        }

        body {
            font-family: 'Space Mono', 'Courier New', Courier, monospace;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.6;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 14px;
        }

        header {
            margin-bottom: 2em;
            padding-bottom: 1em;
            border-bottom: 2px dashed var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-family: 'Press Start 2P', monospace;
            font-size: 1.5em;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: -1px;
        }

        a {
            color: var(--link-color);
            text-decoration: none;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.7em;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }
        
        a.back-btn {
            border: 2px solid var(--text-color);
            padding: 8px 12px;
            box-shadow: 2px 2px 0px var(--text-color);
        }

        a:hover {
            color: var(--link-hover);
        }
        
        a.back-btn:hover {
            box-shadow: 4px 4px 0px var(--link-hover);
            border-color: var(--link-hover);
        }

        .content-area {
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            margin-top: 2em;
        }
        .photo-card {
            border: 2px solid var(--text-color);
            background: #fff;
            padding: 8px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .photo-card:hover {
            transform: translateY(-5px);
            box-shadow: 6px 8px 0px rgba(0,0,0,0.15);
        }
        .photo-placeholder {
            width: 100%;
            aspect-ratio: 4/3;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #ccc;
            margin-bottom: 8px;
            color: #999;
        }
        .photo-caption {
            font-size: 0.85em;
            font-style: italic;
            text-align: center;
        }

    </style>
</head>
<body>

    <header>
        <h1>Photography</h1>
        <a href="index.html" class="back-btn">&lt; BACK</a>
    </header>

    <div class="content-area">
        <p>A collection of my recent shots.</p>

        <h2 style="font-family: 'Press Start 2P', monospace; font-size: 1.1em; margin-top: 2em; margin-bottom: 0.5em;">San Francisco</h2>
        <p style="font-size: 0.9em; opacity: 0.8; margin-top: 0; margin-bottom: 1.5em; font-style: italic;">These photos were shot on my Samsung S10.</p>
        
        <div class="photo-grid">
            <a href="photography/s10/ggbridge.jpg" target="_blank" class="photo-card" style="text-decoration: none; color: inherit; display: block;">
                <div class="photo-placeholder" style="background-image: url('photography/s10/ggbridge.jpg'); background-size: cover; background-position: center; color: transparent;">1</div>
                <div class="photo-caption" style="font-family: 'Space Mono', monospace;">Golden Gate Bridge</div>
            </a>
            <a href="photography/s10/alcatraz.jpg" target="_blank" class="photo-card" style="text-decoration: none; color: inherit; display: block;">
                <div class="photo-placeholder" style="background-image: url('photography/s10/alcatraz.jpg'); background-size: cover; background-position: center; color: transparent;">2</div>
                <div class="photo-caption" style="font-family: 'Space Mono', monospace;">Alcatraz</div>
            </a>
            <a href="photography/s10/oaklandfromSF.jpg" target="_blank" class="photo-card" style="text-decoration: none; color: inherit; display: block;">
                <div class="photo-placeholder" style="background-image: url('photography/s10/oaklandfromSF.jpg'); background-size: cover; background-position: center; color: transparent;">3</div>
                <div class="photo-caption" style="font-family: 'Space Mono', monospace;">Oakland from SF</div>
            </a>
            <a href="photography/s10/SFgardens.jpg" target="_blank" class="photo-card" style="text-decoration: none; color: inherit; display: block;">
                <div class="photo-placeholder" style="background-image: url('photography/s10/SFgardens.jpg'); background-size: cover; background-position: center; color: transparent;">4</div>
                <div class="photo-caption" style="font-family: 'Space Mono', monospace;">SF Gardens</div>
            </a>
            <a href="photography/s10/SFslopes.jpg" target="_blank" class="photo-card" style="text-decoration: none; color: inherit; display: block;">
                <div class="photo-placeholder" style="background-image: url('photography/s10/SFslopes.jpg'); background-size: cover; background-position: center; color: transparent;">5</div>
                <div class="photo-caption" style="font-family: 'Space Mono', monospace;">SF Slopes</div>
            </a>
        </div>
    </div>

</body>
</html>
