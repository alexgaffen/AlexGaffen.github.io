    <path fill="url(#ed-book-b)" d="M70 320q30-18 60-6v54q-30-12-60 6v-54Z"/>
    <path fill="url(#ed-book-a)" d="M190 320q-30-18-60-6v54q30-12 60 6v-54Z"/>
