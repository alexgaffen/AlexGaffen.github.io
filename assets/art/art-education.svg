  <path d="M240 206 C 310 210 330 250 332 300" fill="none" stroke="#f2c14e" stroke-width="8" stroke-linecap="round"/>
  <circle cx="332" cy="314" r="14" fill="#e8b54d"/>
  <ellipse cx="328" cy="309" rx="4" ry="3" fill="#ffffff" opacity="0.55"/>

  <!-- floating open book -->
