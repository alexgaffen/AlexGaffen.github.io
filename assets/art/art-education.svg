  <ellipse cx="382" cy="125" rx="4" ry="3" fill="#ffffff" opacity="0.6"/>
  <path d="M104 130l7 17 17 7-17 7-7 17-7-17-17-7 17-7 7-17Z" fill="#e2a23f" opacity="0.9"/>
