<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" role="img" aria-label="Abstract 3D teaching chalkboard illustration">
  <defs>
    <radialGradient id="tc-bg" cx="50%" cy="40%" r="68%">
      <stop offset="0%" stop-color="#eef3e2"/><stop offset="100%" stop-color="#dde9c9"/>
    </radialGradient>
    <linearGradient id="tc-board" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#79a886"/><stop offset="55%" stop-color="#548662"/><stop offset="100%" stop-color="#3c6a4b"/>
    </linearGradient>
    <linearGradient id="tc-frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8cda2"/><stop offset="100%" stop-color="#c8a06b"/>
    </linearGradient>
    <radialGradient id="tc-sphere" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#f2c2cf"/><stop offset="55%" stop-color="#dd8aa4"/><stop offset="100%" stop-color="#b85f7e"/>
    </radialGradient>
    <filter id="tc-blur" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="9"/></filter>
  </defs>

  <path fill="url(#tc-bg)" d="M242 36c104-6 192 66 198 172 6 112-74 210-184 216C150 430 50 354 44 242 38 132 138 42 242 36Z"/>

  <ellipse cx="240" cy="414" rx="130" ry="16" fill="#4a6a3a" opacity="0.30" filter="url(#tc-blur)"/>

  <!-- easel legs -->
  <line x1="170" y1="300" x2="138" y2="408" stroke="url(#tc-frame)" stroke-width="16" stroke-linecap="round"/>
  <line x1="310" y1="300" x2="342" y2="408" stroke="url(#tc-frame)" stroke-width="16" stroke-linecap="round"/>

  <!-- board -->
  <rect x="108" y="110" width="264" height="200" rx="22" fill="url(#tc-frame)"/>
  <rect x="124" y="126" width="232" height="168" rx="14" fill="url(#tc-board)"/>

  <!-- chalk writing -->
  <path d="M150 176q24-22 48 0t48 0 48 0 42 0" fill="none" stroke="#f6f3e2" stroke-width="9" stroke-linecap="round" opacity="0.9"/>
  <path d="M152 222h84" stroke="#f6f3e2" stroke-width="9" stroke-linecap="round" opacity="0.7"/>
  <path d="M152 252h120" stroke="#f6f3e2" stroke-width="9" stroke-linecap="round" opacity="0.55"/>
  <circle cx="320" cy="240" r="22" fill="none" stroke="#f2c14e" stroke-width="9"/>
  <path d="M306 240l10 10 20-22" fill="none" stroke="#f2c14e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- chat bubble -->
  <g transform="rotate(6 392 120)">
    <rect x="338" y="84" width="96" height="64" rx="24" fill="#fffdf3"/>
    <path d="M366 144l-6 26 30-24" fill="#fffdf3"/>
    <circle cx="368" cy="116" r="6" fill="#79a886"/>
    <circle cx="388" cy="116" r="6" fill="#79a886"/>
    <circle cx="408" cy="116" r="6" fill="#79a886"/>
  </g>

  <!-- accents -->
  <circle cx="92" cy="170" r="16" fill="url(#tc-sphere)"/>
  <ellipse cx="87" cy="164" rx="5" ry="3" fill="#ffffff" opacity="0.6"/>
  <circle cx="404" cy="330" r="10" fill="#e8b54d"/>
</svg>
